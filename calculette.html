<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculatrice Intérêts</title>
	<link rel="icon" type="image/png" href="Calculator.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8fafc; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #1e293b; margin-bottom: 30px; }
        
        .inputs { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #475569; }
        input { width: 90%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 1em; }
															 

        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; }
        .card { padding: 20px; border-radius: 12px; text-align: center; color: white; }
        .card.capital { background-color: #3498db; } /* Bleu */
        .card.interets { background-color: #ffb347; } /* Orange léger */
        .card.total { background-color: #334155; }
        .card-value { font-size: 1.4em; font-weight: bold; margin-top: 5px; }
        .card-label { font-size: 0.8em; text-transform: uppercase; letter-spacing: 1px; }

        canvas { margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Simulateur d'Intérêts Composés</h1>
    
    <div class="inputs">
        <div>
            <label>Montant de départ (€)</label>
            <input type="number" id="p" value="5000" oninput="update()">
        </div>
        <div>
            <label>Mensualité (€)</label>
            <input type="number" id="pmt" value="200" oninput="update()">
        </div>
        <div>
            <label>Nombre d'années</label>
            <input type="number" id="y" value="15" oninput="update()">
        </div>
        <div>
            <label>Taux annuel (%)</label>
            <input type="number" id="r" value="4.0" step="0.1" oninput="update()">
        </div>
    </div>

    <div class="dashboard">
        <div class="card capital">
            <div class="card-label">Capital Versé</div>
            <div id="v_capital" class="card-value">0 €</div>
        </div>
        <div class="card interets">
            <div class="card-label">Intérêts Acquis</div>
            <div id="v_interets" class="card-value">0 €</div>
        </div>
        <div class="card total">
            <div class="card-label">Somme Totale</div>
            <div id="v_total" class="card-value">0 €</div>
        </div>
    </div>

    <canvas id="chart"></canvas>
</div>

<script>
    let myChart;

    function format(val) {
        return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(val);
    }

    function update() {
        const p = parseFloat(document.getElementById('p').value) || 0;
        const pmt = parseFloat(document.getElementById('pmt').value) || 0;
        const y = parseFloat(document.getElementById('y').value) || 0;
        const r_annuel = parseFloat(document.getElementById('r').value) || 0;
        
        const r_mensuel = r_annuel / 100 / 12;
        const n_mois = y * 12;

        let labels = [];
        let capData = [];
        let intData = [];

        for (let i = 0; i <= n_mois; i++) {
            const verse = p + (pmt * i);
            let total = 0;
            if (r_mensuel > 0) {
                total = p * Math.pow(1 + r_mensuel, i) + pmt * (Math.pow(1 + r_mensuel, i) - 1) / r_mensuel;
            } else {
                total = verse;
            }

            labels.push(i % 12 === 0 ? (i/12) + " an(s)" : "");
            capData.push(verse.toFixed(2));
            intData.push((total - verse).toFixed(2));
        }

        // Mise à jour des cartes
        const finalCap = parseFloat(capData[n_mois]);
        const finalInt = parseFloat(intData[n_mois]);
        document.getElementById('v_capital').innerText = format(finalCap);
        document.getElementById('v_interets').innerText = format(finalInt);
        document.getElementById('v_total').innerText = format(finalCap + finalInt);

        // Mise à jour du graphique
        const ctx = document.getElementById('chart').getContext('2d');
        if (myChart) myChart.destroy();

        myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Capital versé (effort d\'épargne)',
                        data: capData,
                        backgroundColor: 'rgba(52, 152, 219, 0.7)', // Bleu clair
                        borderColor: '#3498db',
                        fill: true,
                        pointRadius: 0,
                        order: 1 // Tracé en premier pour être la base
                    },
                    {
                        label: 'Intérêts cumulés (gain)',
                        data: intData,
                        backgroundColor: 'rgba(255, 179, 71, 0.7)', // Orange léger
                        borderColor: '#ffb347',
                        fill: true,
                        pointRadius: 0,
                        order: 2 // Empilé par dessus
                    }
                ]
            },
            options: {
                responsive: true,
                plugins: { 
                    tooltip: { mode: 'index', intersect: false }
                },
                scales: {
                    x: { grid: { display: false } },
                    y: { 
                        stacked: true, 
                        beginAtZero: true, 
                        ticks: { callback: value => value.toLocaleString() + ' €' } 
                    }
                }
            }
        });
    }

    // Lancement initial
    update();
</script>

</body>
</html>
